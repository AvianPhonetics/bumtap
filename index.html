<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta property="vk:app_id" content="12345678"> <!-- замените на ID вашего приложения -->
  <title>Бум Тап 💥 воздушные шары</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0c0b1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 8px;
    }

    .game-container {
      max-width: 400px;
      width: 100%;
      border-radius: 36px;
      background: linear-gradient(145deg, #1a1740, #0e0c24);
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 2px #ff41d8 inset, 0 0 20px #b537f2;
      padding: 16px;
      position: relative; /* для абсолютного позиционирования popup */
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff3b0;
      text-shadow: 0 0 8px #ffb86b, 0 0 20px #ff2b9e, 0 0 40px #b600ff;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .level-selector {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin: 8px 0;
    }

    .level-btn {
      background: #2d2555;
      border: 2px solid #9f7aea;
      color: #e0d4ff;
      border-radius: 40px;
      padding: 8px 14px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.1s;
      flex: 1;
      text-transform: uppercase;
      box-shadow: 0 3px 0 #140e2b;
    }

    .level-btn.active {
      background: #b45eff;
      color: #120b24;
      border-color: #ffdb70;
      box-shadow: 0 0 15px #fbffb9;
      transform: scale(1.02);
    }

    .level-btn:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 #140e2b;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 60px;
      padding: 12px 18px;
      margin: 10px 0 15px;
      border: 1px solid #ff7bff;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      backdrop-filter: blur(4px);
    }

    .stats span {
      color: #ffd966;
      text-shadow: 0 0 10px #ffae00;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 0 30px #cc00ff, inset 0 0 20px #3a0066;
      background: #130e23;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #291e4a, #080318);
      touch-action: none;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      background: linear-gradient(145deg, #ff4dc7, #b500b5);
      border: none;
      border-radius: 60px;
      padding: 14px 8px;
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 6px 0 #4f0069, 0 10px 20px black;
      transition: 0.07s;
      cursor: pointer;
      border: 1px solid #ffb2f0;
    }

    .btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #4f0069, 0 8px 20px black;
    }

    .btn:disabled {
      opacity: 0.5;
      transform: none;
      pointer-events: none;
    }

    /* Абсолютный попап поверх canvas */
    .result-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 320px;
      background: rgba(24, 16, 48, 0.95);
      backdrop-filter: blur(8px);
      border: 2px solid #ffb3ff;
      border-radius: 40px;
      padding: 20px;
      text-align: center;
      color: #fad8ff;
      box-shadow: 0 0 40px #eb7aff;
      transition: 0.3s;
      z-index: 10;
    }

    .result-popup.hidden {
      display: none;
    }

    .result-title {
      font-size: 1.7rem;
      font-weight: bold;
      color: #fff2b5;
      text-shadow: 0 0 15px #ffae00;
      margin-bottom: 8px;
    }

    .result-stats {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .result-quote {
      font-size: 1.1rem;
      font-style: italic;
      background: #2f2366;
      padding: 12px;
      border-radius: 30px;
      border-left: 6px solid #ffa07a;
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      color: #b5a5da;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>БУМ ТАП</h1>

    <div class="level-selector">
      <button class="level-btn active" data-level="easy">🌟 легкий</button>
      <button class="level-btn" data-level="medium">⚡ средний</button>
      <button class="level-btn" data-level="hard">💀 сложный</button>
    </div>

    <div class="stats">
      <div>💥 <span id="score">0</span></div>
      <div>⏱️ <span id="timer">0</span>с</div>
      <div>❤️ <span id="lives">3</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="360" height="480"></canvas>
      <!-- попап результата внутри canvas-wrapper, позиционируется абсолютно -->
      <div class="result-popup hidden" id="resultPopup">
        <div class="result-title" id="resultTitle">ИГРА ОКОНЧЕНА</div>
        <div class="result-stats" id="resultStats"></div>
        <div class="result-quote" id="resultQuote"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="startBtn">▶ старт</button>
      <button class="btn" id="restartBtn">↺ рестарт</button>
    </div>

    <div class="footer">жми на шары, пока не лопнут!</div>
  </div>

  <script src="https://unpkg.com/@vkontakte/vk-bridge@2.1.4/dist/browser.min.js"></script>
  <script>
    (function() {
      if (window.vkBridge) {
        vkBridge.send('VKWebAppInit', {});
      }

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreSpan = document.getElementById('score');
      const timerSpan = document.getElementById('timer');
      const livesSpan = document.getElementById('lives');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const resultPopup = document.getElementById('resultPopup');
      const resultTitle = document.getElementById('resultTitle');
      const resultStats = document.getElementById('resultStats');
      const resultQuote = document.getElementById('resultQuote');

      const w = canvas.width;
      const h = canvas.height;

      // Настройки уровней
      const levelSettings = {
        easy: { spawnInterval: 800, ballLifetime: 1200, green: 0.6, red: 0.25, gold: 0.15, lives: 3, radius: 24 },
        medium: { spawnInterval: 600, ballLifetime: 1000, green: 0.55, red: 0.3, gold: 0.15, lives: 3, radius: 22 },
        hard: { spawnInterval: 400, ballLifetime: 800, green: 0.45, red: 0.4, gold: 0.15, lives: 2, radius: 20 }
      };

      let currentLevel = 'easy';
      let BALL_RADIUS = 24;
      let SPAWN_INTERVAL = 800;
      let BALL_LIFETIME = 1200;
      let GREEN_RATIO = 0.6;
      let RED_RATIO = 0.25;
      let GOLD_RATIO = 0.15;
      let START_LIVES = 3;

      let score = 0;
      let lives = START_LIVES;
      let gameActive = false;
      let gameLoopId = null;
      let balls = [];
      let particles = [];
      let startTime = 0;
      let elapsedSeconds = 0;
      let timerInterval = null;
      let lastSpawnTime = 0;

      const BALL_TYPES = { GREEN: 'green', RED: 'red', GOLD: 'gold' };

      // ---------- Приятные звуки ----------
      let audioCtx = null;

      function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function playSound(type) {
        if (!audioCtx) initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (audioCtx.state !== 'running') return;

        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        switch (type) {
          case 'green': // мягкий колокольчик
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            break;
          case 'red': // низкий "пуф"
            osc.frequency.value = 220;
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
            break;
          case 'gold': // короткая фанфара (две ноты)
            osc.frequency.value = 1046.5; // до
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
            const osc2 = audioCtx.createOscillator();
            osc2.frequency.value = 1318.5; // ми
            osc2.connect(gain);
            osc2.start(now + 0.1);
            osc2.stop(now + 0.2);
            break;
          case 'explosion': // приятный "вууш"
            osc.frequency.value = 300;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
            break;
        }
      }

      // ---------- Таймер ----------
      function startTimer() {
        stopTimer();
        startTime = performance.now() / 1000;
        timerInterval = setInterval(() => {
          if (gameActive) {
            const now = performance.now() / 1000;
            elapsedSeconds = Math.floor(now - startTime);
            timerSpan.innerText = elapsedSeconds;
          }
        }, 200);
      }

      function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
      }

      // ---------- Уровни ----------
      function setLevel(level) {
        currentLevel = level;
        const s = levelSettings[level];
        SPAWN_INTERVAL = s.spawnInterval;
        BALL_LIFETIME = s.ballLifetime;
        GREEN_RATIO = s.green;
        RED_RATIO = s.red;
        GOLD_RATIO = s.gold;
        START_LIVES = s.lives;
        BALL_RADIUS = s.radius;

        document.querySelectorAll('.level-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.level === level) btn.classList.add('active');
        });

        if (!gameActive) resetGame();
      }

      document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => setLevel(btn.dataset.level));
      });

      // ---------- Игровые функции ----------
      function resetGame() {
        score = 0;
        lives = START_LIVES;
        balls = [];
        particles = [];
        elapsedSeconds = 0;
        timerSpan.innerText = '0';
        updateStats();
        stopTimer();
        gameActive = false;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoopId = null;
        startBtn.disabled = false;
        resultPopup.classList.add('hidden');
        draw();
      }

      function startGame() {
        if (gameActive) return;
        resetGame();
        gameActive = true;
        startBtn.disabled = true;
        startTimer();
        lastSpawnTime = performance.now();
        gameLoopId = requestAnimationFrame(gameTick);
      }

      function gameOver() {
        gameActive = false;
        stopTimer();
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoopId = null;
        startBtn.disabled = false;
        showResult();
      }

      function showResult() {
        const totalScore = score;
        const time = elapsedSeconds;

        let quote = '';
        if (totalScore >= 50) quote = 'Ты просто метеор! 🚀 Шары боятся тебя!';
        else if (totalScore >= 30) quote = 'Отличный результат! Пальцы натренированы. 💪';
        else if (totalScore >= 15) quote = 'Неплохо, но можно лучше. Попробуй ещё!';
        else if (totalScore >= 5) quote = 'Ты точно целился? Шары смеются... 😄';
        else quote = 'Ой, всё! Даже шары плачут. 🥲';

        resultStats.innerText = `💥 очки: ${totalScore}  |  ⏱️ время: ${time}с`;
        resultQuote.innerText = `«${quote}»`;
        resultPopup.classList.remove('hidden');

        if (window.vkBridge) {
          vkBridge.send('VKWebAppResizeWindow', { width: 100, height: document.documentElement.scrollHeight });
        }
      }

      // Спавн шара (базовая позиция)
      function spawnBall() {
        const r = Math.random();
        let type;
        if (r < GREEN_RATIO) type = BALL_TYPES.GREEN;
        else if (r < GREEN_RATIO + RED_RATIO) type = BALL_TYPES.RED;
        else type = BALL_TYPES.GOLD;

        const baseX = BALL_RADIUS + Math.random() * (w - 2 * BALL_RADIUS);
        const baseY = BALL_RADIUS + Math.random() * (h - 2 * BALL_RADIUS);

        balls.push({
          baseX, baseY,         // опорные координаты (центр колебаний)
          x: baseX, y: baseY,   // текущие координаты (будут обновляться анимацией)
          radius: BALL_RADIUS,
          type: type,
          spawnTime: performance.now(),
          phaseX: Math.random() * 2 * Math.PI, // случайная фаза для покачивания
          phaseY: Math.random() * 2 * Math.PI,
          speed: 0.002 + Math.random() * 0.003  // скорость покачивания
        });
      }

      // Обновление позиций шаров (плавающее движение)
      function updateBallPositions(now) {
        balls.forEach(b => {
          // Плавное синусоидальное смещение от базовой позиции
          const t = now * b.speed;
          b.x = b.baseX + Math.sin(t + b.phaseX) * 6;   // амплитуда 6 пикселей
          b.y = b.baseY + Math.cos(t + b.phaseY) * 4;
        });
      }

      // Взрыв золотого шара
      function explodeBall(ball) {
        playSound('explosion');
        const blastRadius = 80;
        balls = balls.filter(b => {
          if (b === ball) return false;
          const dx = b.x - ball.x;
          const dy = b.y - ball.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < blastRadius) {
            for (let i = 0; i < 5; i++) {
              particles.push({
                x: b.x + (Math.random() - 0.5) * 20,
                y: b.y + (Math.random() - 0.5) * 20,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 1.0
              });
            }
            return false;
          }
          return true;
        });

        for (let i = 0; i < 15; i++) {
          particles.push({
            x: ball.x + (Math.random() - 0.5) * 30,
            y: ball.y + (Math.random() - 0.5) * 30,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            life: 1.2
          });
        }
      }

      // Обработка касания
      function handleTap(e) {
        if (!gameActive) return;

        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let touchX, touchY;
        if (e.touches) {
          touchX = (e.touches[0].clientX - rect.left) * scaleX;
          touchY = (e.touches[0].clientY - rect.top) * scaleY;
        } else {
          touchX = (e.clientX - rect.left) * scaleX;
          touchY = (e.clientY - rect.top) * scaleY;
        }

        for (let i = balls.length - 1; i >= 0; i--) {
          const b = balls[i];
          const dx = touchX - b.x;
          const dy = touchY - b.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist <= b.radius) {
            playSound(b.type);

            switch (b.type) {
              case BALL_TYPES.GREEN:
                score += 1;
                break;
              case BALL_TYPES.RED:
                lives -= 1;
                if (lives < 0) lives = 0;
                break;
              case BALL_TYPES.GOLD:
                score += 5;
                explodeBall(b);
                break;
            }
            balls.splice(i, 1);
            updateStats();

            if (lives <= 0) {
              gameOver();
            }
            return;
          }
        }
      }

      // Обновление игры
      function update(now) {
        if (!gameActive) return;

        // Спавн
        if (now - lastSpawnTime > SPAWN_INTERVAL) {
          spawnBall();
          lastSpawnTime = now;
        }

        // Удаление старых
        balls = balls.filter(b => (now - b.spawnTime) < BALL_LIFETIME);

        // Обновление позиций шаров (плавание)
        updateBallPositions(now);

        // Частицы
        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.02;
          if (p.life <= 0 || p.y < 0 || p.y > h || p.x < 0 || p.x > w) {
            particles.splice(i, 1);
          }
        }
      }

      // Отрисовка
      function draw() {
        ctx.clearRect(0, 0, w, h);

        // Частицы
        particles.forEach(p => {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = '#ffe38f';
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Шары
        balls.forEach(b => {
          const grad = ctx.createRadialGradient(b.x-8, b.y-8, 5, b.x, b.y, b.radius+5);
          switch (b.type) {
            case BALL_TYPES.GREEN:
              grad.addColorStop(0, '#a0ff9e');
              grad.addColorStop(1, '#1f8b1f');
              break;
            case BALL_TYPES.RED:
              grad.addColorStop(0, '#ff9292');
              grad.addColorStop(1, '#a10000');
              break;
            case BALL_TYPES.GOLD:
              grad.addColorStop(0, '#ffe066');
              grad.addColorStop(1, '#b8860b');
              break;
          }
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.radius, 0, 2 * Math.PI);
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.strokeStyle = 'white';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Блик
          ctx.beginPath();
          ctx.arc(b.x-6, b.y-6, 6, 0, 2*Math.PI);
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fill();

          // Маленькая ниточка для имитации воздушного шара
          ctx.beginPath();
          ctx.moveTo(b.x - 3, b.y + b.radius - 2);
          ctx.lineTo(b.x + 3, b.y + b.radius + 4);
          ctx.lineTo(b.x - 3, b.y + b.radius + 8);
          ctx.fillStyle = '#8b6b4d';
          ctx.fill();
        });

        // Если игра окончена, показываем полупрозрачную маску (необязательно, попап уже есть)
        if (!gameActive && lives === 0) {
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, w, h);
          ctx.globalAlpha = 1;
        }
      }

      function gameTick(timestamp) {
        if (!gameActive) {
          draw();
          return;
        }
        update(timestamp);
        draw();
        if (gameActive) gameLoopId = requestAnimationFrame(gameTick);
        else draw();
      }

      function updateStats() {
        scoreSpan.innerText = score;
        livesSpan.innerText = lives;
      }

      // События
      canvas.addEventListener('touchstart', handleTap, { passive: false });
      canvas.addEventListener('mousedown', handleTap);

      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', resetGame);

      // Инициализация
      setLevel('easy');
      resetGame();

      // Аудио при первом взаимодействии
      function initAudioOnFirstTap() {
        initAudio();
        document.removeEventListener('touchstart', initAudioOnFirstTap);
        document.removeEventListener('mousedown', initAudioOnFirstTap);
      }
      document.addEventListener('touchstart', initAudioOnFirstTap);
      document.addEventListener('mousedown', initAudioOnFirstTap);
    })();
  </script>
</body>
</html>
